name: RetailPOS API Test Suite

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pos_db_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Grant test DB permissions
        run: |
          mysql -u root -proot -h 127.0.0.1 -e "
            CREATE USER IF NOT EXISTS 'prod_user'@'%' IDENTIFIED BY 'RetailPOS_prod_2024';
            GRANT ALL PRIVILEGES ON pos_db_test.* TO 'prod_user'@'%';
            FLUSH PRIVILEGES;
          "

      - name: Install test dependencies
        working-directory: retailpos-tests
        run: npm ci

      - name: Run full test suite
        working-directory: retailpos-tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
        run: npm test -- --forceExit --runInBand

      - name: Run coverage report
        working-directory: retailpos-tests
        run: npm run test:coverage -- --forceExit --runInBand
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-coverage
          path: retailpos-tests/coverage/

  build-backend:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install backend dependencies
        working-directory: retailpos-backend
        run: npm ci

      - name: TypeScript compile check
        working-directory: retailpos-backend
        run: npx tsc --noEmit

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        working-directory: retailpos
        run: npm ci

      - name: Build frontend
        working-directory: retailpos
        run: npm run build
